<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Love Unlock</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
    overflow: hidden;
}

/* LOGIN */
#login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    text-align: center;
    width: 200px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* MAIN */
#main {
    display: none;
    text-align: center;
    padding-top: 50px;
}

.gift {
    width: 120px;
    height: 120px;
    margin: 30px auto;
    background: linear-gradient(145deg, #ff4d6d, #ff99aa);
    border-radius: 15px;
    transform: rotateX(20deg) rotateY(20deg);
    box-shadow: 0 10px 30px rgba(255,0,100,0.4);
    cursor: pointer;
    transition: 0.5s;
}

.gift:hover {
    transform: rotateX(0deg) rotateY(0deg) scale(1.1);
}

#message {
    font-size: 18px;
    margin-top: 20px;
}

/* FINAL HEART */
.final-screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.heart {
    font-size: 100px;
    animation: pulse 1.2s infinite;
    color: red;
}

.name {
    font-size: 24px;
    margin-top: 10px;
    color: #ffb3c6;
}

.subtitle {
    margin-top: 10px;
    font-size: 16px;
    opacity: 0.8;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.3);}
    100% {transform: scale(1);}
}

/* FLOATING HEARTS */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
}

.fheart {
    position: absolute;
    color: pink;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh); opacity: 1;}
    100% {transform: translateY(-10vh); opacity: 0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>🔒 Enter Secret Code</h2>
    <input type="password" id="pass" placeholder="Enter code">
    <button onclick="check()">Unlock</button>
    <p id="err"></p>
</div>

<!-- MAIN -->
<div id="main">
    <h2>🎁 Love Gifts</h2>
    <p>Click the gift to unlock feelings</p>

    <div class="gift" onclick="openGift()"></div>

    <div id="message"></div>
</div>

<!-- FINAL SCREEN -->
<div class="final-screen" id="final">
    <div class="heart">❤️</div>
    <div class="name">fatima ezzahra</div>
    <div class="subtitle">You are my final destination 💖</div>
</div>

<div class="hearts" id="hearts"></div>

<script>
let step = 0;

// LOGIN
function check(){
    let p = document.getElementById("pass").value;

    if(p.toLowerCase() === "bilal"){
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";
        startHearts();
    } else {
        document.getElementById("err").innerText = "Wrong code ❌";
    }
}

// GIFTS
function openGift(){
    step++;

    if(step === 1){
        document.getElementById("message").innerText = "💖 You are the first gift of my heart";
    }
    else if(step === 2){
        document.getElementById("message").innerText = "✨ Every moment with you is magic";
    }
    else if(step === 3){
        document.getElementById("message").innerText = "💍 You are my forever wish...";
    }
    else{
        document.getElementById("main").style.display = "none";
        document.getElementById("final").style.display = "flex";
    }
}

// FLOATING HEARTS
function startHearts(){
    setInterval(() => {
        let h = document.createElement("div");
        h.className = "fheart";
        h.innerHTML = "💖";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = Math.random() * 20 + 10 + "px";
        document.getElementById("hearts").appendChild(h);

        setTimeout(() => h.remove(), 6000);
    }, 300);
}
</script>

</body>
</html>
